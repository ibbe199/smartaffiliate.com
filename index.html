                content: `<h2>ملخص المراجعة</h2><p>Jasper يبقى واحداً من أفضل أدوات الكتابة بالذكاء الاصطناعي في 2026.</p>`
            },
            {
                id: 27,
                title: 'الذكاء الاصطناعي في 2026: دليل المقارنة الشامل بين الأدوات المجانية والمدفوعة',
                icon: 'fa-scale-balanced',
                date: '16 مارس 2026',
                readTime: '12 دقيقة',
                category: 'ai',
                categoryName: 'الذكاء الاصطناعي',
                excerpt: 'تحليل شامل لـ 50 أداة ذكاء اصطناعي في 5 مجالات مختلفة، مع مقارنة عملية بين النسخ المجانية والمدفوعة.',
                externalLink: '',
                externalSource: '',
                url: '#article27',
                content: `<h2>📌 مقدمة</h2><p>في عالم 2026، لم يعد الذكاء الاصطناعي ترفاً تقنياً أو موضة عابرة.</p>`
            }
        ];

        function showHome(e) {
            if (e) e.preventDefault();
            
            const stats = `
                <div class="stats-bar">
                    <div class="stat-item">
                        <div class="stat-number">${articles.length}</div>
                        <div class="stat-label">مقالة</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">6</div>
                        <div class="stat-label">فئات رئيسية</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">500+</div>
                        <div class="stat-label">دقيقة قراءة</div>
                    </div>
                </div>
            `;
            
            renderArticles(articles, stats);
            updateActiveLink('الرئيسية');
        }

        function filterByCategory(category) {
            const filtered = articles.filter(a => a.category === category);
            renderArticles(filtered, '');
            
            const categoryNames = {
                'ai': 'ذكاء اصطناعي',
                'automation': 'أتمتة',
                'affiliate': 'تسويق بالعمولة',
                'case-study': 'دراسات حالة',
                'seo': 'SEO',
                'ecommerce': 'تجارة إلكترونية',
                'reviews': 'مراجعات'
            };
            
            updateActiveLink(categoryNames[category] || category);
        }

        function updateActiveLink(activeText) {
            document.querySelectorAll('.nav-container a').forEach(link => {
                link.classList.remove('active');
                if (link.textContent.includes(activeText)) {
                    link.classList.add('active');
                }
            });
        }

        function renderArticles(articlesList, extraContent = '') {
            const filters = `
                <div class="category-filters">
                    <button class="filter-btn" onclick="showHome(event)"><i class="fas fa-layer-group"></i> الكل (${articles.length})</button>
                    <button class="filter-btn" onclick="filterByCategory('ai')"><i class="fas fa-robot"></i> ذكاء اصطناعي (${articles.filter(a => a.category === 'ai').length})</button>
                    <button class="filter-btn" onclick="filterByCategory('automation')"><i class="fas fa-gears"></i> أتمتة (${articles.filter(a => a.category === 'automation').length})</button>
                    <button class="filter-btn" onclick="filterByCategory('affiliate')"><i class="fas fa-bolt"></i> تسويق بالعمولة (${articles.filter(a => a.category === 'affiliate').length})</button>
                    <button class="filter-btn" onclick="filterByCategory('case-study')"><i class="fas fa-chart-line"></i> دراسات حالة (${articles.filter(a => a.category === 'case-study').length})</button>
                    <button class="filter-btn" onclick="filterByCategory('reviews')"><i class="fas fa-star"></i> مراجعات (${articles.filter(a => a.category === 'reviews').length})</button>
                </div>
            `;
            
            let html = extraContent + filters + '<div class="articles-grid">';
            
            articlesList.forEach(article => {
                html += `
                    <div class="article-card" onclick="showArticle(${article.id})">
                        <span class="category-badge">${article.categoryName}</span>
                        <div class="article-image ${article.category}"></div>
                        <i class="fas ${article.icon}" style="font-size: 2.2rem; color: var(--primary-glow);"></i>
                        <h2>${article.title}</h2>
                        <div class="article-meta">
                            <span><i class="far fa-calendar"></i> ${article.date}</span>
                            <span><i class="far fa-clock"></i> ${article.readTime}</span>
                        </div>
                        <p>${article.excerpt}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap;">
                            <span class="read-more-btn">
                                اقرأ المقال <i class="fas fa-arrow-left"></i>
                            </span>
                            ${article.externalLink ? `
                                <a href="${article.externalLink}" target="_blank" class="external-link" onclick="event.stopPropagation()">
                                    <i class="fas fa-external-link-alt"></i> المصدر
                                </a>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            
            html += `
                <div class="share-section">
                    <h3 style="color: var(--primary-glow);"><i class="fas fa-share-alt"></i> شارك هذه المقالات</h3>
                    <div class="share-buttons">
                        <button onclick="shareOnFacebook()" class="share-btn facebook"><i class="fab fa-facebook-f"></i> فيسبوك</button>
                        <button onclick="shareOnTwitter()" class="share-btn twitter"><i class="fa-brands fa-x-twitter"></i> تويتر</button>
                        <button onclick="shareOnWhatsApp()" class="share-btn whatsapp"><i class="fab fa-whatsapp"></i> واتساب</button>
                        <button onclick="shareOnLinkedIn()" class="share-btn linkedin"><i class="fab fa-linkedin-in"></i> لينكد إن</button>
                    </div>
                </div>
            `;
            
            document.getElementById('main-content').innerHTML = html;
        }

        function showArticle(articleId) {
            const article = articles.find(a => a.id === articleId);
            if (!article) return;

            const relatedArticles = articles
                .filter(a => a.id !== article.id && a.category === article.category)
                .slice(0, 3);

            const html = `
                <div class="back-btn" onclick="showHome(event)" style="display: inline-flex; align-items: center; gap: 10px; color: var(--primary-glow); cursor: pointer; margin-bottom: 2rem;">
                    <i class="fas fa-arrow-right"></i> العودة للرئيسية
                </div>
                
                <div style="background: var(--glass-bg); backdrop-filter: blur(14px); border: 1px solid rgba(0,210,255,0.25); border-radius: var(--card-radius); padding: 3rem; margin: 2rem 0;">
                    <div style="text-align: center; margin-bottom: 3rem; border-bottom: 2px solid rgba(0,210,255,0.2); padding-bottom: 2rem;">
                        <h1 style="font-size: 2.5rem; color: var(--primary-glow); margin-bottom: 1rem;">${article.title}</h1>
                        <div style="display: flex; justify-content: center; gap: 2rem; color: #8a8fb0; font-size: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
                            <span><i class="far fa-calendar"></i> ${article.date}</span>
                            <span><i class="far fa-clock"></i> ${article.readTime}</span>
                            <span><i class="fas fa-tag"></i> ${article.categoryName}</span>
                        </div>
                        ${article.externalLink ? `
                            <a href="${article.externalLink}" target="_blank" style="display: inline-flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 1rem 2rem; border-radius: 50px; color: var(--primary-glow); text-decoration: none; border: 1px solid rgba(0,210,255,0.35);">
                                <i class="fas fa-external-link-alt"></i> قراءة المصدر الأصلي على ${article.externalSource}
                            </a>
                        ` : ''}
                    </div>
                    
                    <div style="color: #e6e8f5; line-height: 2; font-size: 1.1rem;">
                        ${article.content || '<p>محتوى المقالة قيد الإعداد...</p>'}
                    </div>
                    
                    ${relatedArticles.length > 0 ? `
                        <div style="margin-top: 3rem; padding: 2rem; background: rgba(0,0,0,0.2); border-radius: 20px;">
                            <h4 style="color: var(--primary-glow); margin-bottom: 1rem;">📚 مقالات مقترحة</h4>
                            <div style="display: grid; gap: 1rem;">
                                ${relatedArticles.map(a => `
                                    <div onclick="showArticle(${a.id})" style="cursor: pointer; padding: 0.75rem; border-right: 2px solid var(--primary-glow); background: rgba(255,255,255,0.02); border-radius: 10px;">
                                        <i class="fas ${a.icon}" style="color: var(--primary-glow); margin-left: 10px;"></i>
                                        ${a.title}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
            
            document.getElementById('main-content').innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function shareOnFacebook() {
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank');
        }
        
        function shareOnTwitter() {
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(document.title)}`, '_blank');
        }
        
        function shareOnWhatsApp() {
            window.open(`https://wa.me/?text=${encodeURIComponent(document.title + ' ' + window.location.href)}`, '_blank');
        }
        
        function shareOnLinkedIn() {
            window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}`, '_blank');
        }

        function showAbout(e) {
            if (e) e.preventDefault();
            document.getElementById('main-content').innerHTML = `
                <div style="background: var(--glass-bg); backdrop-filter: blur(14px); border: 1px solid rgba(0,210,255,0.25); border-radius: var(--card-radius); padding: 3rem; text-align: center;">
                    <h1 style="color: var(--primary-glow);">من نحن</h1>
                    <p style="font-size: 1.2rem; margin: 2rem 0;">smartafiliate.com هي منصة متخصصة في تقديم محتوى عربي احترافي حول الذكاء الاصطناعي، الأتمتة، والتسويق الرقمي.</p>
                    <p>نهدف لتمكين المسوقين العرب بأحدث المعرفة والأدوات.</p>
                    <p style="margin-top: 2rem;">📚 نقدم الآن <strong>27 مقالة</strong> متخصصة في مجالات: الذكاء الاصطناعي، الأتمتة، التسويق بالعمولة، دراسات حالة، SEO، ومراجعات الأدوات.</p>
                </div>
            `;
        }

        function showContact(e) {
            if (e) e.preventDefault();
            document.getElementById('main-content').innerHTML = `
                <div style="background: var(--glass-bg); backdrop-filter: blur(14px); border: 1px solid rgba(0,210,255,0.25); border-radius: var(--card-radius); padding: 3rem; text-align: center;">
                    <h1 style="color: var(--primary-glow);">اتصل بنا</h1>
                    <p style="font-size: 1.2rem; margin: 2rem 0;">📧 البريد الإلكتروني: info@smartafiliate.com</p>
                    <p>🐦 تويتر: @smartafiliate</p>
                </div>
            `;
        }

        function showExternalLinks(e) {
            if (e) e.preventDefault();
            const externalLinks = articles.filter(a => a.externalLink);
            
            let linksHTML = `
                <div class="back-btn" onclick="showHome(event)" style="display: inline-flex; align-items: center; gap: 10px; color: var(--primary-glow); cursor: pointer; margin-bottom: 2rem;">
                    <i class="fas fa-arrow-right"></i> العودة للرئيسية
                </div>
                
                <div style="background: var(--glass-bg); backdrop-filter: blur(14px); border: 1px solid rgba(0,210,255,0.25); border-radius: var(--card-radius); padding: 3rem;">
                    <h2 style="color: var(--primary-glow); margin-bottom: 2rem;">🔗 روابط خارجية للمقالات</h2>
                    <div style="display: grid; gap: 1rem;">
            `;
            
            externalLinks.forEach(article => {
                linksHTML += `
                    <div style="padding: 1rem; background: rgba(0,210,255,0.05); border-radius: 10px;">
                        <h3 style="color: var(--primary-glow);">${article.title}</h3>
                        <a href="${article.externalLink}" target="_blank" style="color: var(--text-muted); word-break: break-all;">
                            ${article.externalLink}
                        </a>
                        <span style="display: block; color: #8a8fb0; font-size: 0.9rem; margin-top: 0.5rem;">
                            المصدر: ${article.externalSource}
                        </span>
                    </div>
                `;
            });
            
            linksHTML += `</div></div>`;
            document.getElementById('main-content').innerHTML = linksHTML;
        }

        window.onload = () => showHome();
    </script>
</body>
</html>
