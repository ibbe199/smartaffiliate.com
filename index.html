<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAffiliate 2026 | المنصة الشاملة</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #050816;
            --primary-glow: #00d2ff;
            --secondary-glow: #9d50bb;
            --glass-bg: rgba(20, 30, 45, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-muted: #b0b3c5;
            --text-bright: #ffffff;
            --card-radius: 32px;
            --facebook: #1877f2;
            --tiktok: #000000;
            --tiktok-pink: #ff0050;
            --tiktok-blue: #00f2ea;
        }

        body {
            background: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 30% 10%, rgba(0, 210, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(157, 80, 187, 0.08) 0%, transparent 45%);
            color: var(--text-bright);
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
        }

        /* شريط التنقل */
        .glass-header {
            background: rgba(8, 12, 25, 0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--primary-glow);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0.8rem 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            padding: 0 1.5rem;
        }

        .nav-container a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-container a:hover,
        .nav-container a.active {
            background: rgba(0, 210, 255, 0.15);
            color: var(--primary-glow);
        }

        /* الشعار */
        .brand-zone {
            text-align: center;
            padding: 2rem 1.5rem;
        }

        .logo-svg {
            height: 100px;
            filter: drop-shadow(0 0 18px rgba(0, 210, 255, 0.5));
            animation: floatSmart 4.2s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes floatSmart {
            0%, 100% { transform: translateY(0); }
            45% { transform: translateY(-10px); }
        }

        .brand-tagline {
            color: #00d2ff;
            letter-spacing: 4px;
            font-size: 0.85rem;
            margin-top: 0.8rem;
            font-weight: 600;
        }

        /* الحاوية الرئيسية */
        .main-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* شبكة المقالات */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .article-card {
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 2rem;
            transition: 0.4s;
            text-align: right;
            cursor: pointer;
        }

        .article-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-glow);
            box-shadow: 0 30px 40px -15px rgba(0, 210, 255, 0.3);
        }

        .article-card h2 {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        .article-card h2 i {
            color: var(--primary-glow);
            font-size: 2rem;
            background: rgba(0,210,255,0.1);
            padding: 10px;
            border-radius: 50%;
        }

        .article-meta {
            color: #8a8fb0;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .article-card p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }

        .article-link {
            color: var(--primary-glow);
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 0.8rem 1.5rem;
            background: rgba(0,210,255,0.05);
            border-radius: 30px;
            transition: 0.3s;
            border: 1px solid rgba(0,210,255,0.2);
            width: fit-content;
        }

        .article-link:hover {
            background: var(--primary-glow);
            color: #050816;
            gap: 15px;
        }

        /* نافذة المقال المنبثقة */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal-content {
            background: var(--glass-bg);
            border: 2px solid var(--primary-glow);
            border-radius: var(--card-radius);
            padding: 3rem;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            color: #fff;
            box-shadow: 0 0 50px rgba(0,210,255,0.3);
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(255,0,0,0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            transition: 0.3s;
        }

        .close-modal:hover {
            background: #ff4444;
            color: #fff;
        }

        /* صفحة إخلاء المسؤولية */
        .disclaimer-page {
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            border: 1px solid var(--primary-glow);
            border-radius: var(--card-radius);
            padding: 3rem;
            margin: 2rem 0;
            line-height: 1.8;
        }

        .disclaimer-page h1 {
            font-size: 2.5rem;
            color: var(--primary-glow);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .disclaimer-page h2 {
            color: #fff;
            margin: 2rem 0 1rem;
            font-size: 1.5rem;
        }

        .disclaimer-page p {
            color: #b0b3c5;
            margin-bottom: 1.5rem;
        }

        .disclaimer-page ul {
            list-style: none;
            padding: 0;
        }

        .disclaimer-page li {
            margin-bottom: 1rem;
            padding-right: 1.5rem;
            position: relative;
            color: #b0b3c5;
        }

        .disclaimer-page li:before {
            content: "•";
            color: var(--primary-glow);
            font-size: 1.5rem;
            position: absolute;
            right: 0;
            top: -5px;
        }

        .warning-box {
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid orange;
            border-radius: 20px;
            padding: 2rem;
            margin: 2rem 0;
            text-align: center;
        }

        .warning-box i {
            font-size: 3rem;
            color: orange;
            margin-bottom: 1rem;
        }

        /* التذييل */
        footer {
            margin-top: 4rem;
            padding: 3rem 1.5rem;
            border-top: 1px solid rgba(0,210,255,0.2);
            text-align: center;
        }

        .social-ring {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .social-ring a {
            color: #8a8fb0;
            font-size: 2rem;
            transition: 0.3s;
            text-decoration: none;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }

        .social-ring a:hover {
            transform: translateY(-5px);
        }

        /* ألوان خاصة لكل منصة */
        .social-ring a[aria-label="Facebook"]:hover {
            background: var(--facebook);
            color: white;
        }

        .social-ring a[aria-label="TikTok"]:hover {
            background: linear-gradient(45deg, var(--tiktok-pink), var(--tiktok-blue));
            color: white;
        }

        .social-ring a[aria-label="X"]:hover {
            background: #000;
            color: white;
        }

        .social-ring a[aria-label="LinkedIn"]:hover {
            background: #0077b5;
            color: white;
        }

        .social-ring a[aria-label="YouTube"]:hover {
            background: #ff0000;
            color: white;
        }

        .footer-links {
            margin: 1.5rem 0;
        }

        .footer-links a {
            color: #5f6380;
            text-decoration: none;
            margin: 0 1rem;
            transition: 0.3s;
        }

        .footer-links a:hover {
            color: var(--primary-glow);
        }

        @media (max-width: 768px) {
            .articles-grid {
                grid-template-columns: 1fr;
            }
            
            .disclaimer-page {
                padding: 1.5rem;
            }
            
            .disclaimer-page h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <div class="nav-container">
            <a href="#" onclick="showHome(event)" class="active"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="#" onclick="showAllArticles(event)"><i class="fas fa-newspaper"></i> المقالات</a>
            <a href="#" onclick="showDisclaimer(event)"><i class="fas fa-shield-alt"></i> إخلاء المسؤولية</a>
            <a href="#" onclick="showNewsletter(event)"><i class="fas fa-envelope"></i> النشرة</a>
        </div>
    </header>

    <div class="brand-zone" id="home-section">
        <svg class="logo-svg" width="220" height="100" viewBox="0 0 220 100" onclick="showHome(event)">
            <path d="M30 50 L60 25 L90 50 L60 75 L30 50Z" fill="url(#grad1)" stroke="#00d2ff" stroke-width="2.5"/>
            <circle cx="110" cy="50" r="25" fill="url(#grad2)" stroke="#9d50bb" stroke-width="2.5"/>
            <path d="M165 30 L185 50 L165 70 L145 50 L165 30Z" fill="url(#grad3)" stroke="#00d2ff" stroke-width="2.5"/>
            <text x="130" y="90" font-family="Segoe UI" font-weight="bold" font-size="14" fill="#fff" text-anchor="middle">SMARTAFF</text>
            <defs>
                <linearGradient id="grad1" x1="30" y1="50" x2="90" y2="50">
                    <stop stop-color="#00d2ff"/><stop offset="1" stop-color="#9d50bb"/>
                </linearGradient>
                <linearGradient id="grad2" x1="85" y1="25" x2="135" y2="75">
                    <stop stop-color="#9d50bb"/><stop offset="1" stop-color="#00d2ff"/>
                </linearGradient>
                <linearGradient id="grad3" x1="145" y1="50" x2="185" y2="50">
                    <stop stop-color="#00d2ff"/><stop offset="1" stop-color="#6a4e9b"/>
                </linearGradient>
            </defs>
        </svg>
        <div class="brand-tagline">منصة المحتوى الرقمي المتطور</div>
    </div>

    <main class="main-container" id="main-content">
        <!-- يتم تحميل المحتوى هنا عبر JavaScript -->
    </main>

    <!-- نافذة عرض المقال -->
    <div class="modal-overlay" id="article-modal">
        <div class="modal-content">
            <div class="close-modal" onclick="closeModal()">✕</div>
            <h2 class="modal-title" id="modal-title"></h2>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <footer>
        <div class="social-ring">
            <a href="#" onclick="openSocial('facebook')" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" onclick="openSocial('tiktok')" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
            <a href="#" onclick="openSocial('twitter')" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#" onclick="openSocial('linkedin')" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
            <a href="#" onclick="openSocial('youtube')" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
            <a href="#" onclick="openSocial('discord')" aria-label="Discord"><i class="fa-brands fa-discord"></i></a>
        </div>
        
        <div class="footer-links">
            <a href="#" onclick="showHome(event)">الرئيسية</a>
            <a href="#" onclick="showAllArticles(event)">المقالات</a>
            <a href="#" onclick="showDisclaimer(event)">إخلاء المسؤولية</a>
            <a href="#" onclick="showNewsletter(event)">النشرة البريدية</a>
            <a href="#" onclick="showPrivacy(event)">سياسة الخصوصية</a>
        </div>

        <div style="color: #4a4f6e; font-size: 0.9rem;">
            © 2026 SmartAffiliate - جميع الحقوق محفوظة
        </div>
    </footer>

    <script>
        // بيانات المقالات
        const articles = [
            {
                id: 1,
                title: 'مستقبل البحث مع Perplexity',
                icon: 'fa-microchip',
                date: '15 مارس 2026',
                readTime: '8 دقائق',
                views: '2.5k',
                excerpt: 'اكتشف كيف تغير منصة Perplexity قواعد اللعبة في البحث الرقمي.',
                content: `<p>في عالم يتسارع فيه التطور التكنولوجي، تبرز منصة Perplexity AI كأحد أبرز الحلول الثورية في مجال البحث الرقمي. تعتمد المنصة على تقنيات الذكاء الاصطناعي التوليدي لتقديم إجابات دقيقة وموثقة بدلاً من قوائم الروابط التقليدية.</p>
                    <h3 style="color: #00d2ff;">لماذا Perplexity مختلفة؟</h3>
                    <p>تدمج Perplexity بين قوة نماذج اللغة الكبيرة وقدرتها على الوصول إلى المعلومات الحديثة عبر الإنترنت.</p>`
            },
            {
                id: 2,
                title: 'أتمتة الأعمال بالوكلاء الذكيين',
                icon: 'fa-project-diagram',
                date: '10 مارس 2026',
                readTime: '12 دقيقة',
                views: '3.8k',
                excerpt: 'دليل متقدم لبناء نظام وكلاء ذكيين يعمل 24/7.',
                content: `<p>يشهد عالم الأعمال تحولاً جذرياً بفضل الوكلاء الذكيين (AI Agents) القادرين على تنفيذ مهام معقدة بشكل مستقل.</p>`
            },
            {
                id: 3,
                title: 'احتراف التسويق بالعمولة 2026',
                icon: 'fa-chart-line',
                date: '5 مارس 2026',
                readTime: '10 دقائق',
                views: '4.1k',
                excerpt: 'توقعات المنصات والعوائد. دليل شامل مع أمثلة عملية.',
                content: `<p>يشهد التسويق بالعمولة تحولاً كبيراً بفضل الذكاء الاصطناعي والتقنيات الجديدة.</p>`
            }
        ];

        // عرض الصفحة الرئيسية
        function showHome(e) {
            e.preventDefault();
            displayArticles();
            setActiveLink('الرئيسية');
        }

        // عرض جميع المقالات
        function displayArticles() {
            const container = document.getElementById('main-content');
            let html = `
                <h2 style="font-size: 2rem; margin-bottom: 1.5rem;">
                    <i class="fas fa-fire" style="color: var(--primary-glow);"></i> 
                    أحدث المقالات
                </h2>
                <div class="articles-grid">
            `;
            
            articles.forEach(article => {
                html += `
                    <article class="article-card" onclick="openArticle(${article.id})">
                        <h2><i class="fas ${article.icon}"></i> ${article.title}</h2>
                        <div class="article-meta">
                            <span><i class="far fa-calendar"></i> ${article.date}</span>
                            <span><i class="far fa-clock"></i> ${article.readTime}</span>
                            <span><i class="fas fa-eye"></i> ${article.views}</span>
                        </div>
                        <p>${article.excerpt}</p>
                        <a href="#" class="article-link" onclick="event.stopPropagation(); openArticle(${article.id})">
                            <span>قراءة المقال كاملاً</span> <i class="fas fa-arrow-left"></i>
                        </a>
                    </article>
                `;
            });
            
            html += `</div>`;
            container.innerHTML = html;
        }

        // عرض صفحة إخلاء المسؤولية
        function showDisclaimer(e) {
            e.preventDefault();
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="disclaimer-page">
                    <h1><i class="fas fa-shield-alt" style="color: var(--primary-glow);"></i> إخلاء المسؤولية</h1>
                    
                    <div class="warning-box">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3 style="color: orange; margin-bottom: 1rem;">تنبيه هام</h3>
                        <p style="color: #fff;">الرجاء قراءة إخلاء المسؤولية هذا بعناية قبل استخدام الموقع</p>
                    </div>

                    <h2>١. معلومات عامة</h2>
                    <p>موقع SmartAffiliate هو منصة تعليمية وتوعوية تهدف إلى نشر المعرفة حول الذكاء الاصطناعي والتسويق الرقمي. جميع المعلومات المقدمة على هذا الموقع هي لأغراض تعليمية فقط.</p>

                    <h2>٢. عدم تقديم نصائح مالية</h2>
                    <p>المحتوى المقدم على هذا الموقع لا يشكل نصيحة مالية أو استثمارية. يجب عليك استشارة مستشار مالي مؤهل قبل اتخاذ أي قرارات استثمارية.</p>
                    
                    <ul>
                        <li>النتائج المالية السابقة لا تضمن نتائج مستقبلية</li>
                        <li>التسويق بالعمولة ينطوي على مخاطر مالية</li>
                        <li>مسؤولية قراراتك المالية تقع عليك وحدك</li>
                    </ul>

                    <h2>٣. الروابط الخارجية</h2>
                    <p>قد يحتوي موقعنا على روابط لمواقع خارجية. نحن لا نتحمل مسؤولية محتوى أو ممارسات هذه المواقع.</p>

                    <h2>٤. دقة المعلومات</h2>
                    <p>نحن نبذل قصارى جهدنا لضمان دقة المعلومات، ولكن:</p>
                    <ul>
                        <li>قد تحتوي بعض المقالات على أخطاء غير مقصودة</li>
                        <li>المعلومات قابلة للتغيير دون إشعار مسبق</li>
                        <li>ننصح بالتحقق من المعلومات من مصادر متعددة</li>
                    </ul>

                    <h2>٥. الإعلانات والروابط التابعة</h2>
                    <p>قد يحتوي الموقع على روابط تابعة (Affiliate Links). إذا قمت بالشراء من خلال هذه الروابط، قد نحصل على عمولة بدون تكلفة إضافية عليك.</p>

                    <h2>٦. تحديثات إخلاء المسؤولية</h2>
                    <p>نحتفظ بالحق في تحديث أو تعديل إخلاء المسؤولية هذا في أي وقت دون إشعار مسبق. استمرارك في استخدام الموقع يعني موافقتك على التحديثات.</p>

                    <div style="background: rgba(0,210,255,0.05); padding: 2rem; border-radius: 20px; margin-top: 2rem;">
                        <p style="color: #fff; margin: 0;"><i class="fas fa-calendar-alt" style="color: var(--primary-glow); margin-left: 10px;"></i> آخر تحديث: 15 مارس 2026</p>
                    </div>
                </div>
            `;
            setActiveLink('إخلاء المسؤولية');
        }

        // عرض سياسة الخصوصية
        function showPrivacy(e) {
            e.preventDefault();
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="disclaimer-page">
                    <h1><i class="fas fa-lock" style="color: var(--primary-glow);"></i> سياسة الخصوصية</h1>
                    <p>نحن نلتزم بحماية خصوصية زوارنا. هذه السياسة تشرح كيفية جمع واستخدام معلوماتك.</p>
                    
                    <h2>المعلومات التي نجمعها</h2>
                    <ul>
                        <li>الاسم والبريد الإلكتروني (عند الاشتراك)</li>
                        <li>بيانات الاستخدام مثل الصفحات التي تزورها</li>
                        <li>معلومات التقنية مثل نوع المتصفح</li>
                    </ul>

                    <h2>كيف نستخدم معلوماتك</h2>
                    <ul>
                        <li>لتحسين تجربتك في الموقع</li>
                        <li>لإرسال النشرات البريدية (بموافقتك)</li>
                        <li>لتحليل أداء الموقع</li>
                    </ul>
                </div>
            `;
            setActiveLink('سياسة الخصوصية');
        }

        // عرض النشرة البريدية
        function showNewsletter(e) {
            e.preventDefault();
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div style="text-align: center; padding: 4rem; background: var(--glass-bg); border-radius: var(--card-radius);">
                    <i class="fas fa-envelope" style="font-size: 4rem; color: var(--primary-glow); margin-bottom: 1rem;"></i>
                    <h2 style="font-size: 2.5rem;">النشرة البريدية</h2>
                    <p style="color: #b0b3c5; font-size: 1.2rem;">انضم إلى أكثر من 5,000 مشترك</p>
                    <form onsubmit="event.preventDefault(); alert('✅ تم الاشتراك بنجاح!');" style="max-width: 500px; margin: 2rem auto;">
                        <input type="email" placeholder="بريدك الإلكتروني" style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--primary-glow); border-radius: 50px; color: white; margin-bottom: 1rem;">
                        <button type="submit" style="width: 100%; padding: 1rem; background: var(--primary-glow); border: none; border-radius: 50px; font-weight: 800; cursor: pointer;">اشترك الآن</button>
                    </form>
                </div>
            `;
            setActiveLink('النشرة');
        }

        // عرض جميع المقالات
        function showAllArticles(e) {
            e.preventDefault();
            displayArticles();
            setActiveLink('المقالات');
        }

        // فتح المقال
        function openArticle(articleId) {
            event.preventDefault();
            const article = articles.find(a => a.id === articleId);
            if (article) {
                document.getElementById('modal-title').innerHTML = `<i class="fas ${article.icon}" style="color: var(--primary-glow); margin-left: 10px;"></i> ${article.title}`;
                document.getElementById('modal-body').innerHTML = article.content;
                document.getElementById('article-modal').style.display = 'flex';
            }
        }

        // إغلاق النافذة
        function closeModal() {
            document.getElementById('article-modal').style.display = 'none';
        }

        // فتح روابط التواصل الاجتماعي
        function openSocial(platform) {
            const urls = {
                facebook: 'https://facebook.com/smartaffiliate',
                tiktok: 'https://tiktok.com/@smartaffiliate',
                twitter: 'https://twitter.com/smartaffiliate',
                linkedin: 'https://linkedin.com/company/smartaffiliate',
                youtube: 'https://youtube.com/@smartaffiliate',
                discord: 'https://discord.gg/smartaffiliate'
            };
            
            if (urls[platform]) {
                window.open(urls[platform], '_blank');
            } else {
                alert(`سيتم فتح صفحة ${platform} قريباً`);
            }
        }

        // تفعيل الرابط النشط
        function setActiveLink(text) {
            document.querySelectorAll('.nav-container a').forEach(link => {
                link.classList.remove('active');
                if (link.textContent.includes(text)) {
                    link.classList.add('active');
                }
            });
        }

        // تحميل الصفحة الرئيسية
        window.onload = function() {
            displayArticles();
        };

        // إغلاق النافذة بالضغط على ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
