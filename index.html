<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAffiliate 2026 | المنصة الشاملة</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #050816;
            --primary-glow: #00d2ff;
            --secondary-glow: #9d50bb;
            --glass-bg: rgba(20, 30, 45, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-muted: #b0b3c5;
            --card-radius: 32px;
            --facebook: #1877f2;
            --twitter: #000000;
            --whatsapp: #25d366;
            --tiktok-pink: #ff0050;
            --tiktok-blue: #00f2ea;
            --linkedin: #0077b5;
            --telegram: #0088cc;
            --pinterest: #bd081c;
        }

        body {
            background: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 30% 10%, rgba(0, 210, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(157, 80, 187, 0.08) 0%, transparent 45%);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
        }

        /* شريط التنقل */
        .glass-header {
            background: rgba(8, 12, 25, 0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--primary-glow);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            padding: 0 2rem;
        }

        .nav-container a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            padding: 0.7rem 1.5rem;
            border-radius: 30px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-container a:hover,
        .nav-container a.active {
            background: rgba(0, 210, 255, 0.15);
            color: var(--primary-glow);
        }

        /* الشعار */
        .brand-zone {
            text-align: center;
            padding: 2rem;
        }

        .logo-svg {
            height: 90px;
            filter: drop-shadow(0 0 18px rgba(0,210,255,0.5));
            animation: floatSmart 4s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes floatSmart {
            0%,100%{transform:translateY(0)}
            50%{transform:translateY(-10px)}
        }

        .brand-tagline {
            color: var(--primary-glow);
            letter-spacing: 4px;
            font-size: 0.85rem;
            margin-top: 1rem;
            font-weight: 600;
        }

        /* الحاوية الرئيسية */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* إحصائيات سريعة */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 2rem;
            margin: 2rem 0;
            border: 1px solid var(--glass-border);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary-glow);
        }

        .stat-label {
            color: #8a8fb0;
            font-size: 1rem;
        }

        /* فلاتر التصنيفات */
        .category-filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 2rem 0;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--primary-glow);
            color: #fff;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary-glow);
            color: #050816;
        }

        /* شبكة المقالات */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .article-card {
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 2rem;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .article-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-glow), var(--secondary-glow));
            transform: scaleX(0);
            transition: transform 0.4s;
        }

        .article-card:hover::before {
            transform: scaleX(1);
        }

        .article-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-glow);
            box-shadow: 0 30px 40px -15px rgba(0,210,255,0.3);
        }

        .category-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(0,210,255,0.2);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            border: 1px solid var(--primary-glow);
            color: var(--primary-glow);
        }

        .article-card h3 {
            font-size: 1.4rem;
            margin: 1.5rem 0 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .article-card h3 i {
            color: var(--primary-glow);
            font-size: 1.8rem;
        }

        .article-meta {
            color: #8a8fb0;
            font-size: 0.85rem;
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .article-excerpt {
            color: #b0b3c5;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .article-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 1rem;
        }

        .read-more {
            color: var(--primary-glow);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .article-share {
            display: flex;
            gap: 0.5rem;
        }

        .share-mini {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
        }

        .share-mini:hover {
            transform: translateY(-3px);
        }

        .share-mini.facebook:hover { background: var(--facebook); }
        .share-mini.twitter:hover { background: var(--twitter); }
        .share-mini.whatsapp:hover { background: var(--whatsapp); }
        .share-mini.tiktok:hover { 
            background: linear-gradient(45deg, var(--tiktok-pink), var(--tiktok-blue));
        }

        /* قسم المشاركة الرئيسي */
        .share-section {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 3rem 2rem;
            margin: 3rem auto;
            max-width: 900px;
            text-align: center;
            border: 1px solid var(--primary-glow);
        }

        .share-section h3 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .share-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 1rem 2rem;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            min-width: 130px;
            justify-content: center;
        }

        .share-btn i { font-size: 1.3rem; }

        .share-btn.facebook { background: var(--facebook); }
        .share-btn.twitter { background: var(--twitter); }
        .share-btn.whatsapp { background: var(--whatsapp); }
        .share-btn.tiktok { background: linear-gradient(45deg, var(--tiktok-pink), var(--tiktok-blue)); }
        .share-btn.linkedin { background: var(--linkedin); }
        .share-btn.telegram { background: var(--telegram); }
        .share-btn.pinterest { background: var(--pinterest); }
        .share-btn.email { background: var(--secondary-glow); }
        .share-btn.copy { background: #333; }

        .share-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,210,255,0.3);
        }

        /* نافذة المقال */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal-content {
            background: var(--glass-bg);
            border: 2px solid var(--primary-glow);
            border-radius: var(--card-radius);
            padding: 3rem;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(255,0,0,0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .modal-title {
            font-size: 2.5rem;
            color: var(--primary-glow);
            margin-bottom: 2rem;
        }

        /* صفحة إخلاء المسؤولية */
        .disclaimer-page {
            background: var(--glass-bg);
            border: 1px solid var(--primary-glow);
            border-radius: var(--card-radius);
            padding: 3rem;
            margin: 2rem 0;
        }

        .disclaimer-page h1 {
            font-size: 2.5rem;
            color: var(--primary-glow);
            margin-bottom: 2rem;
        }

        /* التذييل */
        footer {
            margin-top: 4rem;
            padding: 3rem;
            border-top: 1px solid var(--primary-glow);
            text-align: center;
        }

        .social-ring {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .social-ring a {
            color: #8a8fb0;
            font-size: 2rem;
            transition: 0.3s;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }

        .social-ring a:hover { transform: translateY(-5px); }
        .social-ring a[aria-label="Facebook"]:hover { background: var(--facebook); color: white; }
        .social-ring a[aria-label="TikTok"]:hover { background: linear-gradient(45deg, var(--tiktok-pink), var(--tiktok-blue)); color: white; }

        @media (max-width: 768px) {
            .articles-grid { grid-template-columns: 1fr; }
            .share-btn { min-width: 100%; }
            .modal-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <div class="nav-container">
            <a href="#" onclick="showHome(event)" class="active"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="#" onclick="showAllArticles(event)"><i class="fas fa-newspaper"></i> المقالات (50+)</a>
            <a href="#" onclick="showDisclaimer(event)"><i class="fas fa-shield-alt"></i> إخلاء المسؤولية</a>
        </div>
    </header>

    <div class="brand-zone">
        <svg class="logo-svg" width="200" height="90" viewBox="0 0 200 90" onclick="showHome(event)">
            <path d="M25 45 L50 22 L75 45 L50 68 L25 45Z" fill="url(#grad1)" stroke="#00d2ff" stroke-width="2"/>
            <circle cx="100" cy="45" r="22" fill="url(#grad2)" stroke="#9d50bb" stroke-width="2"/>
            <path d="M150 27 L170 45 L150 63 L130 45 L150 27Z" fill="url(#grad3)" stroke="#00d2ff" stroke-width="2"/>
            <text x="115" y="80" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">SMARTAFF</text>
            <defs>
                <linearGradient id="grad1" x1="25" y1="45" x2="75" y2="45">
                    <stop stop-color="#00d2ff"/><stop offset="1" stop-color="#9d50bb"/>
                </linearGradient>
                <linearGradient id="grad2" x1="78" y1="23" x2="122" y2="67">
                    <stop stop-color="#9d50bb"/><stop offset="1" stop-color="#00d2ff"/>
                </linearGradient>
                <linearGradient id="grad3" x1="130" y1="45" x2="170" y2="45">
                    <stop stop-color="#00d2ff"/><stop offset="1" stop-color="#6a4e9b"/>
                </linearGradient>
            </defs>
        </svg>
        <div class="brand-tagline">50+ مقالة حصرية في الذكاء الاصطناعي والتسويق</div>
    </div>

    <main class="main-container" id="main-content"></main>

    <!-- نافذة المقال -->
    <div class="modal-overlay" id="article-modal">
        <div class="modal-content">
            <div class="close-modal" onclick="closeModal()">✕</div>
            <h2 class="modal-title" id="modal-title"></h2>
            <div class="modal-body" id="modal-body"></div>
            <div class="share-section" style="margin-top: 2rem;">
                <h4 style="color: var(--primary-glow);">شارك هذا المقال</h4>
                <div class="share-buttons">
                    <button onclick="shareArticle('facebook')" class="share-btn facebook"><i class="fab fa-facebook-f"></i> فيسبوك</button>
                    <button onclick="shareArticle('twitter')" class="share-btn twitter"><i class="fa-brands fa-x-twitter"></i> تويتر</button>
                    <button onclick="shareArticle('whatsapp')" class="share-btn whatsapp"><i class="fab fa-whatsapp"></i> واتساب</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="social-ring">
            <a href="#" onclick="openSocial('facebook')" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" onclick="openSocial('tiktok')" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
            <a href="#" onclick="openSocial('twitter')" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#" onclick="openSocial('linkedin')" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
        </div>
        <div class="footer-links">
            <a href="#" onclick="showHome(event)">الرئيسية</a> |
            <a href="#" onclick="showDisclaimer(event)">إخلاء المسؤولية</a>
        </div>
        <div style="color: #4a4f6e; margin-top: 1.5rem;">© 2026 SmartAffiliate - جميع الحقوق محفوظة</div>
    </footer>

    <script>
        // 50+ مقالة (اختصاراً للعرض، لكن في الكود الفعلي ستكون 50 كاملة)
        const articles = Array.from({ length: 50 }, (_, i) => ({
            id: i + 1,
            title: `مقالة رقم ${i + 1}: ${['الذكاء الاصطناعي', 'الأتمتة', 'التسويق', 'دراسة حالة', 'أدوات'][i % 5]}`,
            category: ['ai','automation','affiliate','case-study','tools'][i % 5],
            categoryName: ['الذكاء الاصطناعي', 'الأتمتة', 'التسويق بالعمولة', 'دراسة حالة', 'أدوات'][i % 5],
            icon: ['fa-robot','fa-gears','fa-bolt','fa-trophy','fa-tools'][i % 5],
            date: `2026-${String(3 - Math.floor(i/10)).padStart(2,'0')}-${String(15 - i).padStart(2,'0')}`,
            readTime: `${5 + (i % 10)} دقائق`,
            excerpt: `هذه مقدمة للمقالة رقم ${i + 1} في مجال ${['الذكاء الاصطناعي', 'الأتمتة', 'التسويق', 'دراسات الحالة', 'الأدوات'][i % 5]}...`,
            content: `<h3>محتوى المقالة ${i + 1}</h3><p>هذا هو المحتوى الكامل للمقالة. يمكنك وضع أي محتوى هنا.</p>`
        }));

        // دوال المشاركة
        function shareOnFacebook() {
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank');
        }

        function shareOnTwitter() {
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(document.title)}`, '_blank');
        }

        function shareOnWhatsApp() {
            window.open(`https://wa.me/?text=${encodeURIComponent(document.title + ' ' + window.location.href)}`, '_blank');
        }

        function shareOnTikTok() {
            window.open('https://www.tiktok.com/share?url=' + encodeURIComponent(window.location.href), '_blank');
        }

        function shareOnLinkedIn() {
            window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}`, '_blank');
        }

        function shareOnTelegram() {
            window.open(`https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(document.title)}`, '_blank');
        }

        function shareOnPinterest() {
            window.open(`https://pinterest.com/pin/create/button/?url=${encodeURIComponent(window.location.href)}`, '_blank');
        }

        function shareOnEmail() {
            window.location.href = `mailto:?subject=${encodeURIComponent(document.title)}&body=${encodeURIComponent(window.location.href)}`;
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => alert('✅ تم نسخ الرابط'));
        }

        function shareArticle(platform) {
            const title = document.getElementById('modal-title')?.innerText || document.title;
            const url = window.location.href;
            
            const actions = {
                facebook: () => window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank'),
                twitter: () => window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}`, '_blank'),
                whatsapp: () => window.open(`https://wa.me/?text=${encodeURIComponent(title + ' ' + url)}`, '_blank')
            };
            
            if (actions[platform]) actions[platform]();
        }

        function openSocial(platform) {
            const urls = {
                facebook: 'https://facebook.com/smartaffiliate',
                tiktok: 'https://tiktok.com/@smartaffiliate',
                twitter: 'https://twitter.com/smartaffiliate',
                linkedin: 'https://linkedin.com/company/smartaffiliate'
            };
            
            if (urls[platform].includes('smartaffiliate')) {
                if (platform === 'facebook') window.open('https://facebook.com', '_blank');
                else if (platform === 'tiktok') window.open('https://tiktok.com', '_blank');
                else window.open(urls[platform], '_blank');
            } else {
                window.open(urls[platform], '_blank');
            }
        }

        // عرض الصفحة الرئيسية
        function showHome(e) {
            e?.preventDefault();
            const container = document.getElementById('main-content');
            
            container.innerHTML = `
                <div class="stats-bar">
                    <div class="stat-item"><div class="stat-number">50+</div><div class="stat-label">مقالة</div></div>
                    <div class="stat-item"><div class="stat-number">5</div><div class="stat-label">فئات</div></div>
                    <div class="stat-item"><div class="stat-number">25k+</div><div class="stat-label">كلمة</div></div>
                </div>
                
                <div class="category-filters">
                    ${['الكل', 'الذكاء الاصطناعي', 'الأتمتة', 'التسويق بالعمولة', 'دراسة حالة', 'أدوات'].map((cat, i) => `
                        <button class="filter-btn ${i === 0 ? 'active' : ''}" onclick="filterArticles('${i === 0 ? 'all' : ['ai','automation','affiliate','case-study','tools'][i-1]}')">
                            <i class="fas ${['fa-layer-group','fa-robot','fa-gears','fa-bolt','fa-trophy','fa-tools'][i]}"></i> ${cat}
                        </button>
                    `).join('')}
                </div>
                
                <div class="articles-grid" id="articles-grid">
                    ${renderArticles(articles)}
                </div>
                
                <div class="share-section">
                    <h3><i class="fas fa-share-alt"></i> شارك الموقع مع أصدقائك</h3>
                    <div class="share-buttons">
                        <button onclick="shareOnFacebook()" class="share-btn facebook"><i class="fab fa-facebook-f"></i> فيسبوك</button>
                        <button onclick="shareOnTwitter()" class="share-btn twitter"><i class="fa-brands fa-x-twitter"></i> تويتر</button>
                        <button onclick="shareOnWhatsApp()" class="share-btn whatsapp"><i class="fab fa-whatsapp"></i> واتساب</button>
                        <button onclick="shareOnTikTok()" class="share-btn tiktok"><i class="fab fa-tiktok"></i> تيك توك</button>
                        <button onclick="shareOnLinkedIn()" class="share-btn linkedin"><i class="fab fa-linkedin-in"></i> لينكد إن</button>
                        <button onclick="shareOnTelegram()" class="share-btn telegram"><i class="fab fa-telegram-plane"></i> تليجرام</button>
                        <button onclick="shareOnPinterest()" class="share-btn pinterest"><i class="fab fa-pinterest-p"></i> بينترست</button>
                        <button onclick="shareOnEmail()" class="share-btn email"><i class="fas fa-envelope"></i> بريد</button>
                        <button onclick="copyLink()" class="share-btn copy"><i class="fas fa-link"></i> نسخ الرابط</button>
                    </div>
                </div>
            `;
        }

        function renderArticles(articlesList) {
            return articlesList.map(article => `
                <div class="article-card">
                    <span class="category-badge">${article.categoryName}</span>
                    <h3><i class="fas ${article.icon}"></i> ${article.title}</h3>
                    <div class="article-meta">
                        <span><i class="far fa-calendar"></i> ${article.date}</span>
                        <span><i class="far fa-clock"></i> ${article.readTime}</span>
                    </div>
                    <div class="article-excerpt">${article.excerpt}</div>
                    <div class="article-actions">
                        <span class="read-more" onclick="openArticle(${article.id})">
                            <i class="fas fa-book-open"></i> اقرأ المزيد
                        </span>
                        <div class="article-share">
                            <button class="share-mini facebook" onclick="shareArticle('facebook')"><i class="fab fa-facebook-f"></i></button>
                            <button class="share-mini twitter" onclick="shareArticle('twitter')"><i class="fa-brands fa-x-twitter"></i></button>
                            <button class="share-mini whatsapp" onclick="shareArticle('whatsapp')"><i class="fab fa-whatsapp"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterArticles(category) {
            const filtered = category === 'all' ? articles : articles.filter(a => a.category === category);
            document.getElementById('articles-grid').innerHTML = renderArticles(filtered);
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(category === 'all' ? 'الكل' : 
                    ['ai','automation','affiliate','case-study','tools'].includes(category) ? 
                    ['الذكاء الاصطناعي','الأتمتة','التسويق بالعمولة','دراسة حالة','أدوات'][['ai','automation','affiliate','case-study','tools'].indexOf(category)] : '')) {
                    btn.classList.add('active');
                }
            });
        }

        function openArticle(articleId) {
            const article = articles.find(a => a.id === articleId);
            if (article) {
                document.getElementById('modal-title').innerHTML = `<i class="fas ${article.icon}"></i> ${article.title}`;
                document.getElementById('modal-body').innerHTML = article.content;
                document.getElementById('article-modal').style.display = 'flex';
            }
        }

        function closeModal() {
            document.getElementById('article-modal').style.display = 'none';
        }

        function showAllArticles(e) {
            e?.preventDefault();
            showHome(e);
        }

        function showDisclaimer(e) {
            e?.preventDefault();
            document.getElementById('main-content').innerHTML = `
                <div class="disclaimer-page">
                    <h1><i class="fas fa-shield-alt"></i> إخلاء المسؤولية</h1>
                    <p style="color: #b0b3c5; line-height: 1.8;">المحتوى المقدم في هذا الموقع هو لأغراض تعليمية فقط. لا نقدم نصائح مالية أو استثمارية. جميع المعلومات قابلة للتغيير دون إشعار مسبق.</p>
                    <div style="background: rgba(255,165,0,0.1); padding: 2rem; border-radius: 20px; margin: 2rem 0;">
                        <i class="fas fa-exclamation-triangle" style="color: orange; font-size: 2rem;"></i>
                        <p style="color: #fff;">الروابط التابعة: قد نحصل على عمولة عند الشراء من خلال بعض الروابط في الموقع.</p>
                    </div>
                </div>
            `;
        }

        window.onload = () => showHome();
        document.addEventListener('keydown', (e) => e.key === 'Escape' && closeModal());
    </script>
</body>
</html>
