<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAffiliate - المدونة</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --accent-color: #f687b3;
            --dark-bg: #1a1a2e;
            --card-bg: #ffffff;
            --text-dark: #2d3748;
            --text-light: #718096;
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* رأس الصفحة */
        .blog-header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 20px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .blog-header h1 {
            font-size: 3.5em;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .blog-header p {
            font-size: 1.2em;
            color: var(--text-light);
            margin-bottom: 25px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 30px;
            background: var(--gradient);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(102,126,234,0.3);
        }

        .back-link:hover {
            transform: translateX(-5px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }

        .back-link i {
            font-size: 1.1em;
        }

        /* شبكة المقالات */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        /* بطاقة المقالة */
        .blog-card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: var(--shadow);
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
        }

        .blog-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--gradient);
            transform: scaleX(0);
            transition: transform 0.4s;
            transform-origin: right;
        }

        .blog-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(102,126,234,0.2);
        }

        .blog-card:hover::before {
            transform: scaleX(1);
        }

        /* أيقونة التصنيف */
        .category-icon {
            width: 60px;
            height: 60px;
            background: var(--gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .category-icon i {
            font-size: 30px;
            color: white;
        }

        /* شارة التصنيف */
        .category-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 20px;
            background: var(--gradient);
            color: white;
            border-radius: 50px;
            font-size: 0.85em;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }

        /* عنوان المقالة */
        .blog-card h2 {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--text-dark);
            margin: 20px 0 15px;
            line-height: 1.4;
        }

        /* تاريخ المقالة */
        .blog-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-light);
            font-size: 0.95em;
            margin-bottom: 15px;
        }

        .blog-meta i {
            color: var(--primary-color);
        }

        /* نص المقالة */
        .blog-excerpt {
            color: var(--text-light);
            margin-bottom: 25px;
            flex-grow: 1;
            font-size: 1em;
            line-height: 1.7;
        }

        /* زر قراءة المزيد */
        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 25px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            color: var(--primary-color);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid rgba(102,126,234,0.2);
            align-self: flex-start;
        }

        .read-more:hover {
            background: var(--gradient);
            color: white;
            gap: 15px;
            border-color: transparent;
        }

        .read-more i {
            font-size: 0.9em;
            transition: 0.3s;
        }

        .read-more:hover i {
            transform: translateX(-5px);
        }

        /* أزرار التصنيف السريع */
        .quick-categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 40px 0;
        }

        .category-btn {
            padding: 10px 25px;
            background: white;
            border: 2px solid transparent;
            border-radius: 50px;
            color: var(--text-dark);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--gradient);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.3);
        }

        .category-btn i {
            font-size: 1em;
        }

        /* أزرار الترقيم */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 50px 0 20px;
            flex-wrap: wrap;
        }

        .page-btn {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            color: var(--text-dark);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .page-btn:hover,
        .page-btn.active {
            background: var(--gradient);
            color: white;
            border-color: transparent;
            transform: translateY(-3px);
        }

        /* قسم النشرة البريدية */
        .newsletter {
            background: var(--gradient);
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            color: white;
            margin: 50px 0;
        }

        .newsletter h3 {
            font-size: 2em;
            margin-bottom: 15px;
        }

        .newsletter p {
            opacity: 0.9;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .newsletter-form {
            display: flex;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .newsletter-form input {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            outline: none;
            font-family: 'Cairo', sans-serif;
        }

        .newsletter-form button {
            padding: 15px 35px;
            background: white;
            border: none;
            border-radius: 50px;
            color: var(--primary-color);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .newsletter-form button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* تذييل الصفحة */
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 30px;
            color: var(--text-light);
            border-top: 1px solid rgba(255,255,255,0.3);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .footer-links a:hover {
            color: var(--primary-color);
        }

        /* تأثيرات حركية */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .blog-card {
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* تصميم متجاوب */
        @media (max-width: 768px) {
            .blog-header h1 {
                font-size: 2.5em;
            }

            .blog-grid {
                grid-template-columns: 1fr;
            }

            .newsletter-form {
                flex-direction: column;
            }

            .newsletter {
                padding: 30px 20px;
            }

            .category-btn {
                padding: 8px 20px;
                font-size: 0.9em;
            }
        }

        @media (max-width: 480px) {
            .blog-header h1 {
                font-size: 2em;
            }

            .blog-card {
                padding: 20px;
            }

            .blog-card h2 {
                font-size: 1.3em;
            }
        }

        /* شريط التمرير المخصص */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gradient);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }

        /* زر العودة للأعلى */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--gradient);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
            opacity: 0;
            transition: 0.3s;
            z-index: 1000;
        }

        .scroll-top.visible {
            opacity: 1;
        }

        .scroll-top:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- رأس الصفحة -->
        <header class="blog-header">
            <h1><i class="fas fa-blog"></i> SmartAffiliate</h1>
            <p>أحدث المقالات في الذكاء الاصطناعي، الأتمتة، والتسويق الرقمي</p>
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-right"></i> العودة للرئيسية
            </a>
        </header>

        <!-- أزرار التصنيفات السريعة -->
        <div class="quick-categories">
            <button class="category-btn active" onclick="filterPosts('all')">
                <i class="fas fa-layer-group"></i> الكل
            </button>
            <button class="category-btn" onclick="filterPosts('ai')">
                <i class="fas fa-robot"></i> الذكاء الاصطناعي
            </button>
            <button class="category-btn" onclick="filterPosts('automation')">
                <i class="fas fa-gears"></i> الأتمتة
            </button>
            <button class="category-btn" onclick="filterPosts('affiliate')">
                <i class="fas fa-bolt"></i> التسويق بالعمولة
            </button>
            <button class="category-btn" onclick="filterPosts('case-study')">
                <i class="fas fa-chart-line"></i> دراسات حالة
            </button>
            <button class="category-btn" onclick="filterPosts('seo')">
                <i class="fas fa-magnifying-glass"></i> SEO
            </button>
        </div>

        <!-- شبكة المقالات -->
        <div class="blog-grid" id="blog-posts">
            <!-- سيتم إضافة المقالات هنا عبر JavaScript -->
        </div>

        <!-- أزرار الترقيم -->
        <div class="pagination">
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn">4</button>
            <button class="page-btn">5</button>
        </div>

        <!-- قسم النشرة البريدية -->
        <div class="newsletter">
            <h3><i class="fas fa-envelope"></i> اشترك في نشرتنا البريدية</h3>
            <p>احصل على أحدث المقالات والنصائح مباشرة في بريدك الإلكتروني</p>
            <form class="newsletter-form" onsubmit="event.preventDefault(); alert('تم الاشتراك بنجاح!');">
                <input type="email" placeholder="أدخل بريدك الإلكتروني" required>
                <button type="submit">اشتراك</button>
            </form>
        </div>

        <!-- تذييل الصفحة -->
        <footer>
            <div class="footer-links">
                <a href="index.html">الرئيسية</a>
                <a href="about.html">من نحن</a>
                <a href="contact.html">اتصل بنا</a>
                <a href="privacy.html">سياسة الخصوصية</a>
            </div>
            <p>© 2026 SmartAffiliate - جميع الحقوق محفوظة</p>
        </footer>
    </div>

    <!-- زر العودة للأعلى -->
    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>
        // قائمة المقالات
        const blogPosts = [
            {
                id: 1,
                title: 'الدليل الشامل للتسويق بالعمولة 2026',
                category: 'affiliate',
                categoryName: 'التسويق بالعمولة',
                date: '10 مارس 2026',
                excerpt: 'كل ما تحتاج معرفته لبدء مشوارك في عالم التسويق بالعمولة وتحقيق دخل ثابت.',
                icon: 'fa-bolt'
            },
            {
                id: 2,
                title: 'الأتمتة المتكاملة: كيف تبني نظاماً يعمل 24/7',
                category: 'automation',
                categoryName: 'الأتمتة',
                date: '12 مارس 2026',
                excerpt: 'دليل عملي شامل لبناء نظام أتمتة متكامل لعملك، من البريد الإلكتروني إلى خدمة العملاء.',
                icon: 'fa-gears'
            },
            {
                id: 3,
                title: 'كيف تبني استراتيجية تسويق محتوى ناجحة في 2026',
                category: 'content',
                categoryName: 'تسويق محتوى',
                date: '8 مارس 2026',
                excerpt: 'استراتيجيات متقدمة لبناء محتوى يجذب الزوار ويحولهم إلى عملاء دائمين.',
                icon: 'fa-pen-fancy'
            },
            {
                id: 4,
                title: 'أفضل 10 أدوات مجانية لتحسين محركات البحث SEO',
                category: 'seo',
                categoryName: 'SEO',
                date: '6 مارس 2026',
                excerpt: 'تجميعة لأقوى الأدوات المجانية التي تساعدك في تحسين ترتيب موقعك في نتائج البحث.',
                icon: 'fa-magnifying-glass'
            },
            {
                id: 5,
                title: 'دراسة حالة: كيف حقق متجر صغير مليون دولار في سنة',
                category: 'case-study',
                categoryName: 'دراسات حالة',
                date: '4 مارس 2026',
                excerpt: 'تحليل مفصل لرحلة متجر إلكتروني ناشئ من الصفر إلى المليون دولار في 12 شهراً.',
                icon: 'fa-chart-line'
            },
            {
                id: 6,
                title: 'مستقبل الذكاء الاصطناعي في التسويق الرقمي 2026',
                category: 'ai',
                categoryName: 'الذكاء الاصطناعي',
                date: '2 مارس 2026',
                excerpt: 'تحليل شامل لكيفية تغيير الذكاء الاصطناعي لقواعد اللعبة في عالم التسويق الرقمي.',
                icon: 'fa-robot'
            }
        ];

        // عرض جميع المقالات
        function displayPosts(posts) {
            const container = document.getElementById('blog-posts');
            container.innerHTML = '';
            
            posts.forEach(post => {
                const card = `
                    <div class="blog-card" data-category="${post.category}">
                        <div class="category-icon">
                            <i class="fas ${post.icon}"></i>
                        </div>
                        <span class="category-badge">${post.categoryName}</span>
                        <h2>${post.title}</h2>
                        <div class="blog-meta">
                            <i class="far fa-calendar"></i>
                            <span>${post.date}</span>
                        </div>
                        <p class="blog-excerpt">${post.excerpt}</p>
                        <a href="#" class="read-more" onclick="openArticle(${post.id})">
                            اقرأ المزيد <i class="fas fa-arrow-left"></i>
                        </a>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // تصفية المقالات حسب التصنيف
        function filterPosts(category) {
            // تحديث الأزرار النشطة
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // تصفية المقالات
            if (category === 'all') {
                displayPosts(blogPosts);
            } else {
                const filtered = blogPosts.filter(post => post.category === category);
                displayPosts(filtered);
            }
        }

        // فتح المقالة
        function openArticle(id) {
            event.preventDefault();
            alert(`سيتم فتح المقالة رقم ${id}`);
            // هنا يمكن إضافة رابط للمقالة الفعلية
        }

        // إظهار/إخفاء زر العودة للأعلى
        window.addEventListener('scroll', () => {
            const scrollTop = document.getElementById('scrollTop');
            if (window.scrollY > 300) {
                scrollTop.classList.add('visible');
            } else {
                scrollTop.classList.remove('visible');
            }
        });

        // تحميل المقالات عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            displayPosts(blogPosts);
        });
    </script>
</body>
</html>
