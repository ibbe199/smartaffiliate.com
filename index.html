<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Finder - Affiliate Reviews</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f5f6fa;
margin:0;
padding:0;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.filters{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:30px;
}

.filters input,
.filters select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card h3{
margin-top:10px;
}

.price{
color:#0066cc;
font-weight:bold;
margin:10px 0;
}

.btn{
display:block;
background:#0066cc;
color:white;
text-decoration:none;
padding:10px;
text-align:center;
border-radius:6px;
margin-top:10px;
}

.rating{
color:#ffc107;
}

</style>
</head>

<body>

<div class="container">

<h1>Find The Best Products</h1>

<div class="filters">

<input type="text" id="search" placeholder="Search product...">

<select id="category">
<option value="all">All Categories</option>
<option value="electronics">Electronics</option>
<option value="gaming">Gaming</option>
<option value="audio">Audio</option>
</select>

<select id="price">
<option value="all">All Prices</option>
<option value="100">Under $100</option>
<option value="300">Under $300</option>
<option value="1000">Under $1000</option>
</select>

</div>

<div class="products" id="products">

<div class="card" data-category="audio" data-price="199">
<h3>Wireless Earbuds</h3>
<div class="rating">★★★★★</div>
<p class="price">$199</p>
<a href="#" class="btn">Check Price</a>
</div>

<div class="card" data-category="electronics" data-price="799">
<h3>4K Webcam</h3>
<div class="rating">★★★★☆</div>
<p class="price">$799</p>
<a href="#" class="btn">Check Price</a>
</div>

<div class="card" data-category="gaming" data-price="89">
<h3>Gaming Mouse</h3>
<div class="rating">★★★★★</div>
<p class="price">$89</p>
<a href="#" class="btn">Check Price</a>
</div>

<div class="card" data-category="electronics" data-price="299">
<h3>Smartwatch</h3>
<div class="rating">★★★★☆</div>
<p class="price">$299</p>
<a href="#" class="btn">Check Price</a>
</div>

<div class="card" data-category="audio" data-price="349">
<h3>Noise Cancelling Headphones</h3>
<div class="rating">★★★★★</div>
<p class="price">$349</p>
<a href="#" class="btn">Check Price</a>
</div>

</div>

</div>

<script>

const searchInput=document.getElementById("search");
const categoryFilter=document.getElementById("category");
const priceFilter=document.getElementById("price");

const products=document.querySelectorAll(".card");

function filterProducts(){

const search=searchInput.value.toLowerCase();
const category=categoryFilter.value;
const price=priceFilter.value;

products.forEach(product=>{

const name=product.querySelector("h3").textContent.toLowerCase();
const productCategory=product.dataset.category;
const productPrice=parseInt(product.dataset.price);

let show=true;

if(!name.includes(search)) show=false;

if(category!=="all" && category!==productCategory) show=false;

if(price!=="all" && productPrice>price) show=false;

product.style.display=show?"block":"none";

});

}

searchInput.addEventListener("input",filterProducts);
categoryFilter.addEventListener("change",filterProducts);
priceFilter.addEventListener("change",filterProducts);

</script>

</body>
</html>
