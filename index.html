<style>
    /* تصميم قسم الاشتراك في النشرة البريدية */
    .newsletter-section {
        max-width: 800px;
        margin: 60px auto;
        padding: 40px 20px;
        background: linear-gradient(135deg, rgba(0, 210, 255, 0.1), rgba(157, 80, 187, 0.1));
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .newsletter-section::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(0, 210, 255, 0.05) 0%, transparent 70%);
        z-index: -1;
    }

    .newsletter-section h2 {
        font-size: 26px;
        margin-bottom: 10px;
        background: linear-gradient(90deg, #fff, var(--primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .newsletter-section p {
        color: var(--text-dim);
        font-size: 15px;
        margin-bottom: 25px;
    }

    .subscribe-form {
        display: flex;
        gap: 10px;
        max-width: 500px;
        margin: 0 auto;
    }

    .subscribe-form input {
        flex: 2;
        padding: 15px 20px;
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        outline: none;
        transition: 0.3s;
    }

    .subscribe-form input:focus {
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.1);
    }

    .subscribe-btn {
        flex: 1;
        padding: 15px;
        border-radius: 15px;
        border: none;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        color: #000;
        font-weight: 800;
        cursor: pointer;
        transition: 0.3s;
    }

    .subscribe-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
    }

    /* تحسين العرض على الموبايل */
    @media (max-width: 600px) {
        .subscribe-form {
            flex-direction: column;
        }
        .subscribe-btn {
            width: 100%;
        }
    }
</style>

<section class="newsletter-section">
    <h2>انضم إلى مجتمعنا الذكي 🚀</h2>
    <p>كن أول من يعرف عن أحدث أدوات الذكاء الاصطناعي واستراتيجيات الأفلييت لعام 2026.</p>
    
    <form class="subscribe-form" onsubmit="event.preventDefault(); alert('شكرًا لثقتك! تم تسجيل إيميلك بنجاح.');">
        <input type="email" placeholder="أدخل بريدك الإلكتروني هنا..." required>
        <button type="submit" class="subscribe-btn">اشترك الآن</button>
    </form>
    
    <small style="display: block; margin-top: 15px; color: #555; font-size: 11px;">
        نحن نحترم خصوصيتك، ولا نرسل بريداً مزعجاً أبداً.
    </small>
</section>
