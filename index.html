                </div>
                
                <div class="share-section">
                    <h3><i class="fas fa-share-alt"></i> شارك الموقع مع أصدقائك</h3>
                    <div class="share-buttons">
                        <button onclick="shareOnFacebook()" class="share-btn facebook"><i class="fab fa-facebook-f"></i> فيسبوك</button>
                        <button onclick="shareOnTwitter()" class="share-btn twitter"><i class="fa-brands fa-x-twitter"></i> تويتر</button>
                        <button onclick="shareOnWhatsApp()" class="share-btn whatsapp"><i class="fab fa-whatsapp"></i> واتساب</button>
                        <button onclick="shareOnTikTok()" class="share-btn tiktok"><i class="fab fa-tiktok"></i> تيك توك</button>
                        <button onclick="shareOnLinkedIn()" class="share-btn linkedin"><i class="fab fa-linkedin-in"></i> لينكد إن</button>
                        <button onclick="shareOnTelegram()" class="share-btn telegram"><i class="fab fa-telegram-plane"></i> تليجرام</button>
                        <button onclick="shareOnPinterest()" class="share-btn pinterest"><i class="fab fa-pinterest-p"></i> بينترست</button>
                        <button onclick="shareOnEmail()" class="share-btn email"><i class="fas fa-envelope"></i> بريد</button>
                        <button onclick="copyLink()" class="share-btn copy"><i class="fas fa-link"></i> نسخ الرابط</button>
                    </div>
                </div>
            `;
        }

        function renderArticles(articlesList) {
            return articlesList.map(article => `
                <div class="article-card">
                    <span class="category-badge">${article.categoryName}</span>
                    <div class="external-link-badge">
                        <i class="fas fa-external-link-alt"></i> مصدر خارجي: ${article.source}
                    </div>
                    <h3><i class="fas ${article.icon}"></i> ${article.title}</h3>
                    <div class="article-meta">
                        <span><i class="far fa-calendar"></i> ${article.date}</span>
                        <span><i class="far fa-clock"></i> ${article.readTime}</span>
                    </div>
                    <div class="article-excerpt">${article.excerpt}</div>
                    <a href="${article.link}" target="_blank" rel="noopener" class="article-link">
                        <span><i class="fas fa-external-link-alt"></i> قراءة على ${article.source}</span>
                        <i class="fas fa-arrow-left"></i>
                    </a>
                </div>
            `).join('');
        }

        function filterArticles(category) {
            const filtered = category === 'all' ? articles : articles.filter(a => a.category === category);
            document.getElementById('articles-grid').innerHTML = renderArticles(filtered);
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(category === 'all' ? 'الكل' : 
                    ['ai','automation','affiliate','case-study','tools'].includes(category) ? 
                    ['الذكاء الاصطناعي','الأتمتة','التسويق بالعمولة','دراسة حالة','أدوات'][['ai','automation','affiliate','case-study','tools'].indexOf(category)] : '')) {
                    btn.classList.add('active');
                }
            });
        }

        function showAllArticles(e) { e?.preventDefault(); showHome(e); }
        
        function showDisclaimer(e) {
            e?.preventDefault();
            document.getElementById('main-content').innerHTML = `
                <div style="background: var(--glass-bg); border: 1px solid var(--primary-glow); border-radius: var(--card-radius); padding: 3rem; margin: 2rem 0;">
                    <h1 style="font-size: 2.5rem; color: var(--primary-glow); margin-bottom: 2rem;"><i class="fas fa-shield-alt"></i> إخلاء المسؤولية</h1>
                    <p style="color: #b0b3c5; line-height: 1.8;">المقالات في هذا الموقع هي روابط لمصادر خارجية. نحن لا نتحمل مسؤولية محتوى المواقع الخارجية. جميع المعلومات هي لأغراض تعليمية فقط.</p>
                    <div style="background: rgba(255,165,0,0.1); padding: 2rem; border-radius: 20px; margin: 2rem 0;">
                        <i class="fas fa-exclamation-triangle" style="color: orange; font-size: 2rem;"></i>
                        <p style="color: #fff;">الروابط الخارجية تفتح في نافذة جديدة. يرجى مراجعة سياسات الخصوصية للمواقع الخارجية.</p>
                    </div>
                </div>
            `;
        }

        window.onload = () => showHome();
    </script>
</body>
</html>
