<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Deals</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f3f3f3;
}

header{
background:#232f3e;
color:white;
padding:20px;
text-align:center;
font-size:24px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:contain;
}

.card h3{
font-size:18px;
margin:10px 0;
}

.buy{
display:inline-block;
background:#ff9900;
color:white;
padding:10px 15px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

.buy:hover{
background:#e68a00;
}

footer{
text-align:center;
padding:20px;
background:#232f3e;
color:white;
}

</style>
</head>

<body>

<header>
🔥 Amazon Best Deals
</header>

<div class="products" id="products"></div>

<footer>
Amazon Affiliate Store
</footer>

<script>

const products = [

{
name:"Bluetooth Earbuds",
img:"https://m.media-amazon.com/images/I/71QKQ9mwV7L._AC_SL1500_.jpg",
link:"https://www.amazon.com/dp/B09DT48V16/?tag=no05c2b-20"
},

{
name:"SSD Drive",
img:"https://m.media-amazon.com/images/I/81mS1j5nqBL._AC_SL1500_.jpg",
link:"https://www.amazon.com/dp/B08N5WRWNW/?tag=no05c2b-20"
},

{
name:"Smart Watch",
img:"https://m.media-amazon.com/images/I/61ZjlBOp+rL._AC_SL1500_.jpg",
link:"https://www.amazon.com/dp/B08H8X23ZB/?tag=no05c2b-20"
},

{
name:"Wireless Headphones",
img:"https://m.media-amazon.com/images/I/71l2q6v1D+L._AC_SL1500_.jpg",
link:"https://www.amazon.com/dp/B09DT48V16/?tag=no05c2b-20"
},

{
name:"Power Bank",
img:"https://m.media-amazon.com/images/I/71eO8m8s0BL._AC_SL1500_.jpg",
link:"https://www.amazon.com/dp/B0B4W9LQ3G/?tag=no05c2b-20"
},

{
name:"HD Webcam",
img:"https://m.media-amazon.com/images/I/61UxfXTUyvL._AC_SL1500_.jpg",
link:"https://www.amazon.com/dp/B085TFF7M1/?tag=no05c2b-20"
}

];

const container = document.getElementById("products");

products.forEach(product=>{

const card = document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${product.img}">
<h3>${product.name}</h3>
<a class="buy" href="${product.link}" target="_blank">Buy on Amazon</a>

`;

container.appendChild(card);

});

</script>

</body>
</html>
