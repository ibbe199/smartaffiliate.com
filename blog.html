<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المدونة - SmartAffiliate | أحدث المقالات</title>
    <meta name="description" content="مدونة SmartAffiliate - أحدث المقالات في الذكاء الاصطناعي، الأتمتة، التسويق بالعمولة، ودراسات الحالة.">
    <meta name="keywords" content="مدونة, ذكاء اصطناعي, أتمتة, تسويق, مقالات">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ربط بالصفحة الرئيسية -->
    <link rel="canonical" href="https://smartafiliate.com/blog.html">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        
        .blog-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            border: 1px solid #e0e0e0;
        }
        
        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102,126,234,0.2);
            border-color: #667eea;
        }
        
        .blog-category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 0.8em;
            margin-bottom: 15px;
        }
        
        .blog-card h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.3em;
        }
        
        .blog-meta {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        
        .blog-excerpt {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .read-more {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .read-more:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
        }
        
        .page-btn {
            padding: 10px 15px;
            border: 1px solid #667eea;
            background: transparent;
            color: #667eea;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .page-btn:hover, .page-btn.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-blog"></i> مدونة SmartAffiliate</h1>
            <p>أحدث المقالات في الذكاء الاصطناعي، الأتمتة، والتسويق الرقمي</p>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
        </header>
        
        <div class="blog-grid" id="blog-posts">
            <!-- سيتم إضافة المقالات هنا عبر JavaScript -->
        </div>
        
        <div class="pagination" id="pagination">
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
        </div>
    </div>
    
    <script>
        // استيراد نفس قائمة المقالات (يمكنك نسخها من الصفحة الرئيسية)
        const blogPosts = [
            { id: 1, title: 'مستقبل الذكاء الاصطناعي في التسويق الرقمي 2026', category: 'ai', categoryName: 'الذكاء الاصطناعي', date: '15 مارس 2026', excerpt: 'تحليل شامل وعميق لكيفية تغيير الذكاء الاصطناعي لقواعد اللعبة...' },
            { id: 2, title: 'الأتمتة المتكاملة: كيف تبني نظاماً يعمل 24/7', category: 'automation', categoryName: 'الأتمتة', date: '12 مارس 2026', excerpt: 'دليل عملي شامل لبناء نظام أتمتة متكامل لعملك...' },
            { id: 3, title: 'الدليل الشامل للتسويق بالعمولة 2026', category: 'affiliate', categoryName: 'التسويق بالعمولة', date: '10 مارس 2026', excerpt: 'كل ما تحتاج معرفته لبدء مشوارك في عالم التسويق بالعمولة...' },
            { id: 4, title: 'دراسة حالة: كيف حقق متجر صغير مليون دولار في سنة', category: 'case-study', categoryName: 'دراسات حالة', date: '8 مارس 2026', excerpt: 'تحليل مفصل لرحلة متجر إلكتروني ناشئ من الصفر إلى المليون دولار...' },
            { id: 5, title: 'كيف تبني استراتيجية تسويق بالمحتوى ناجحة في 2026', category: 'content', categoryName: 'تسويق محتوى', date: '6 مارس 2026', excerpt: 'دليل عملي لبناء استراتيجية محتوى تجذب الزوار...' },
            { id: 6, title: 'أفضل 10 أدوات مجانية لتحسين محركات البحث (SEO)', category: 'seo', categoryName: 'SEO', date: '4 مارس 2026', excerpt: 'تجميعة لأقوى الأدوات المجانية لتحسين ترتيب موقعك...' }
        ];
        
        function displayPosts(posts) {
            const container = document.getElementById('blog-posts');
            container.innerHTML = '';
            
            posts.forEach(post => {
                const card = `
                    <div class="blog-card">
                        <span class="blog-category">${post.categoryName}</span>
                        <h2>${post.title}</h2>
                        <div class="blog-meta"><i class="far fa-calendar"></i> ${post.date}</div>
                        <p class="blog-excerpt">${post.excerpt}</p>
                        <a href="index.html#article-${post.id}" class="read-more">اقرأ المزيد <i class="fas fa-arrow-left"></i></a>
                    </div>
                `;
                container.innerHTML += card;
            });
        }
        
        displayPosts(blogPosts);
    </script>
</body>
</html>
