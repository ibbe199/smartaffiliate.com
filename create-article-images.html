                        <h3>${article.title}</h3>
                        <div class="article-meta">
                            <span><i class="far fa-calendar-alt"></i> ${article.date}</span>
                            <span><i class="far fa-clock"></i> ${article.readTime}</span>
                        </div>
                        ${article.rating ? `<div class="article-rating">${ratingStars} (${article.rating}/5)</div>` : ''}
                    </div>
                    <div class="article-actions">
                        <button class="action-btn download" onclick="generateSingleImage(${article.id})">
                            <i class="fas fa-download"></i> تحميل
                        </button>
                        <button class="action-btn copy" onclick="copyFileName(${article.id})">
                            <i class="fas fa-copy"></i> اسم الملف
                        </button>
                        <button class="action-btn preview" onclick="previewImage(${article.id})">
                            <i class="fas fa-eye"></i> معاينة
                        </button>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // الحصول على نجوم التقييم
        function getRatingStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= Math.floor(rating)) {
                    stars += '<i class="fas fa-star"></i>';
                } else if (i === Math.ceil(rating) && rating % 1 !== 0) {
                    stars += '<i class="fas fa-star-half-alt"></i>';
                } else {
                    stars += '<i class="far fa-star"></i>';
                }
            }
            return stars;
        }

        // تصفية المقالات
        function filterArticles() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = articles.filter(article => 
                article.title.toLowerCase().includes(searchTerm) ||
                article.category.toLowerCase().includes(searchTerm)
            );
            currentFilter = filtered;
            displayArticles(filtered);
        }

        // إنشاء صورة واحدة
        function generateSingleImage(articleId) {
            const article = articles.find(a => a.id === articleId);
            if (!article) return;
            
            showNotification(`جاري إنشاء صورة المقال ${article.id}...`, 'info');
            
            const container = createImageContainer(article);
            document.body.appendChild(container);
            
            html2canvas(container, {
                scale: 2,
                backgroundColor: null,
                logging: false,
                allowTaint: true,
                useCORS: true
            }).then(canvas => {
                const fileName = getFileName(article);
                downloadCanvas(canvas, fileName);
                
                document.body.removeChild(container);
                generatedCount++;
                updateStats();
                showNotification(`تم إنشاء ${fileName} بنجاح`, 'success');
            }).catch(error => {
                console.error('خطأ:', error);
                showNotification('حدث خطأ في إنشاء الصورة', 'error');
                document.body.removeChild(container);
            });
        }

        // إنشاء جميع الصور
        function generateAllImages() {
            if (confirm('سيتم إنشاء 26 صورة. قد يستغرق هذا بضع دقائق. هل تريد المتابعة؟')) {
                generatedCount = 0;
                updateStats();
                
                articles.forEach((article, index) => {
                    setTimeout(() => {
                        generateSingleImage(article.id);
                    }, index * 3000);
                });
            }
        }

        // تحميل جميع الصور كملف ZIP
        function downloadAllAsZip() {
            showNotification('جاري تجهيز ملف ZIP...', 'info');
            
            const zip = new JSZip();
            let processed = 0;
            
            articles.forEach((article, index) => {
                setTimeout(() => {
                    const container = createImageContainer(article);
                    document.body.appendChild(container);
                    
                    html2canvas(container, {
                        scale: 2,
                        backgroundColor: null,
                        logging: false
                    }).then(canvas => {
                        const fileName = getFileName(article);
                        const imageData = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
                        zip.file(fileName, imageData, { base64: true });
                        
                        document.body.removeChild(container);
                        processed++;
                        
                        if (processed === articles.length) {
                            zip.generateAsync({ type: 'blob' }).then(blob => {
                                const link = document.createElement('a');
                                link.href = URL.createObjectURL(blob);
                                link.download = 'smartaffiliate-articles-images.zip';
                                link.click();
                                showNotification('تم إنشاء ملف ZIP بنجاح', 'success');
                            });
                        }
                    });
                }, index * 2000);
            });
        }

        // إنشاء حاوية الصورة
        function createImageContainer(article) {
            const container = document.createElement('div');
            container.style.width = '1200px';
            container.style.height = '630px';
            container.style.background = 'linear-gradient(135deg, #050816 0%, #1a1a3a 100%)';
            container.style.position = 'relative';
            container.style.overflow = 'hidden';
            container.style.fontFamily = 'Segoe UI, system-ui, sans-serif';
            
            // خلفية
            container.innerHTML = `
                <div style="position:absolute; top:0; left:0; right:0; bottom:0; background-image: radial-gradient(circle at 20% 30%, rgba(0,210,255,0.2) 0%, transparent 30%), radial-gradient(circle at 80% 70%, rgba(157,80,187,0.2) 0%, transparent 40%);"></div>
                <div style="position:absolute; top:-100px; right:-100px; width:400px; height:400px; border-radius:50%; background: linear-gradient(45deg, #00d2ff, #9d50bb); filter: blur(40px); opacity:0.3;"></div>
                <div style="position:absolute; bottom:-150px; left:-150px; width:500px; height:500px; border-radius:50%; background: linear-gradient(45deg, #9d50bb, #00d2ff); filter: blur(50px); opacity:0.3;"></div>
                
                <div style="position:relative; z-index:10; padding:60px; height:100%; display:flex; flex-direction:column; justify-content:space-between;">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div style="width:60px; height:60px; background:linear-gradient(45deg, #00d2ff, #9d50bb); border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:bold; color:#050816;">S</div>
                        <div style="font-size:28px; font-weight:700; color:white;">Smart<span style="color:#00d2ff;">Affiliate</span></div>
                    </div>
                    
                    <div style="margin:20px 0;">
                        <span style="display:inline-block; background:linear-gradient(45deg, #00d2ff, #9d50bb); color:#050816; padding:8px 25px; border-radius:50px; font-size:18px; font-weight:700; margin-bottom:20px;">${article.category}</span>
                        <h1 style="font-size:${article.title.length > 50 ? '42px' : '48px'}; font-weight:800; color:white; line-height:1.3; max-width:800px; text-shadow:0 5px 15px rgba(0,0,0,0.5);">${article.title}</h1>
                        ${article.rating ? `
                            <div style="display:flex; align-items:center; gap:10px; margin:15px 0;">
                                <div style="color:#ffc107; font-size:24px;">
                                    ${getRatingStars(article.rating)}
                                </div>
                                <div style="font-size:32px; font-weight:800; color:#00d2ff;">${article.rating}</div>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div style="font-size:20px; color:rgba(255,255,255,0.7); letter-spacing:2px; display:flex; align-items:center; gap:10px; border-top:1px solid rgba(0,210,255,0.3); padding-top:20px;">
                        <i class="fas fa-globe" style="color:#00d2ff;"></i> smartafiliate.com
                    </div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:center; color:#8a8fb0;">
                        <div><i class="far fa-calendar-alt"></i> ${article.date}</div>
                        <div><i class="far fa-clock"></i> ${article.readTime}</div>
                    </div>
                </div>
            `;
            
            return container;
        }

        // الحصول على اسم الملف
        function getFileName(article) {
            const categoryMap = {
                'الذكاء الاصطناعي': 'ai',
                'أتمتة': 'automation',
                'تسويق بالعمولة': 'affiliate',
                'دراسات حالة': 'case-study',
                'SEO': 'seo',
                'تجارة إلكترونية': 'ecommerce',
                'مراجعات': 'review'
            };
            
            const cat = categoryMap[article.category] || article.categoryEn;
            const titleSlug = article.title
                .toLowerCase()
                .replace(/[^\w\s]/g, '')
                .replace(/\s+/g, '-')
                .substring(0, 30);
            
            return `article${article.id}-${cat}-${titleSlug}.jpg`;
        }

        // تحميل الصورة
        function downloadCanvas(canvas, fileName) {
            const link = document.createElement('a');
            link.download = fileName;
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
        }

        // نسخ اسم الملف
        function copyFileName(articleId) {
            const article = articles.find(a => a.id === articleId);
            const fileName = getFileName(article);
            
            navigator.clipboard.writeText(fileName).then(() => {
                showNotification(`تم نسخ اسم الملف: ${fileName}`, 'success');
            });
        }

        // معاينة الصورة
        function previewImage(articleId) {
            const article = articles.find(a => a.id === articleId);
            const container = createImageContainer(article);
            
            const previewWindow = window.open('', '_blank', 'width=1200,height=630');
            previewWindow.document.write(`
                <html>
                <head><title>معاينة - ${article.title}</title></head>
                <body style="margin:0; padding:0;">${container.outerHTML}</body>
                </html>
            `);
        }

        // تحديث الإحصائيات
        function updateStats() {
            document.getElementById('generatedCount').textContent = generatedCount;
            const percent = Math.round((generatedCount / articles.length) * 100);
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').textContent = `${generatedCount} من ${articles.length} صورة تم إنشاؤها`;
        }

        // عرض هيكل المجلد
        function showFolderStructure() {
            const folderStructure = document.getElementById('folderStructure');
            const folderTree = document.getElementById('folderTree');
            
            if (folderStructure.style.display === 'none') {
                let tree = '<i class="fas fa-folder folder"></i> images/<br>';
                tree += '&nbsp;&nbsp;├── <i class="fas fa-folder folder"></i> articles/<br>';
                
                articles.forEach(article => {
                    const fileName = getFileName(article);
                    tree += `&nbsp;&nbsp;│&nbsp;&nbsp;├── <i class="fas fa-file-image file"></i> ${fileName}<br>`;
                });
                
                tree += '&nbsp;&nbsp;│&nbsp;&nbsp;└── <i class="fas fa-file-image file"></i> ...<br>';
                tree += '&nbsp;&nbsp;├── <i class="fas fa-file-image file"></i> logo.svg<br>';
                tree += '&nbsp;&nbsp;├── <i class="fas fa-file-image file"></i> favicon.ico<br>';
                tree += '&nbsp;&nbsp;└── <i class="fas fa-file-image file"></i> og-image.jpg';
                
                folderTree.innerHTML = tree;
                folderStructure.style.display = 'block';
            } else {
                folderStructure.style.display = 'none';
            }
        }

        // إعادة تعيين
        function resetGenerator() {
            generatedCount = 0;
            updateStats();
            showNotification('تم إعادة التعيين', 'info');
        }

        // إظهار الإشعار
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            const icon = notification.querySelector('i');
            const messageSpan = document.getElementById('notificationMessage');
            
            icon.className = type === 'success' ? 'fas fa-check-circle' : 
                            type === 'error' ? 'fas fa-exclamation-circle' : 
                            'fas fa-info-circle';
            
            messageSpan.textContent = message;
            notification.className = `notification show ${type}`;
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // بدء التشغيل
        window.onload = () => {
            displayArticles();
            updateStats();
        };
    </script>
</body>
</html>
